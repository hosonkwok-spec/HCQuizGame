<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function() {
  const PASS = 'OT3960';
  const KEY = 'quiz_editor_auth';
  if (sessionStorage.getItem(KEY) !== PASS) {
    const input = prompt('Enter password to access Editor:');
    if (input !== PASS) {
      document.write('<div style="font-family:sans-serif;text-align:center;padding:80px;background:#0f0f13;color:#ef4444;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;"><div style="font-size:48px;">🔒</div><div style="font-size:20px;font-weight:700;">Access Denied</div><div style="font-size:14px;color:#8888a0;">Incorrect password.</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#6c63ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;">Try Again</button></div>');
      throw new Error('Unauthorised');
    }
    sessionStorage.setItem(KEY, PASS);
  }
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #23232f;
    --border: #2e2e3e;
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #e8e8f0;
    --text-muted: #8888a0;
    --radius-card: 12px;
    --radius-btn: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-btn);
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #cc3333; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover:not(:disabled) { background: #18a84e; }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .btn-icon { padding: 6px; background: transparent; color: var(--text-muted); border: none; }
  .btn-icon:hover { color: var(--text); background: var(--surface2); border-radius: 6px; }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }

  .quiz-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .quiz-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-btn);
    cursor: pointer;
    transition: background 0.15s;
  }

  .quiz-item:hover { background: var(--surface2); }
  .quiz-item.active { background: rgba(108,99,255,0.2); }

  .quiz-item-title {
    flex: 1;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .quiz-item-title-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 2px 6px;
    outline: none;
  }

  .quiz-count {
    font-size: 11px;
    color: var(--text-muted);
  }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  /* Right panel */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-muted);
  }

  .panel-empty svg { opacity: 0.3; }

  /* Question editor */
  .editor-area {
    flex: 1;
    overflow: hidden;
    padding: 24px;
    display: flex;
    gap: 24px;
    min-height: 0;
  }

  .editor-form {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 0;
    overflow-y: auto;
    min-height: 0;
  }

  .editor-sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
    min-height: 0;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  textarea, input[type="text"], input[type="number"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  textarea:focus, input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 80px; }

  /* Type selector */
  .type-selector {
    display: flex;
    gap: 8px;
  }

  .type-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-btn);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .type-btn.active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.2);
    color: var(--accent);
  }

  /* Options */
  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }

  .option-label {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  .opt-a { background: rgba(231,76,60,0.2); color: #e74c3c; }
  .opt-b { background: rgba(52,152,219,0.2); color: #3498db; }
  .opt-c { background: rgba(46,204,113,0.2); color: #2ecc71; }
  .opt-d { background: rgba(243,156,18,0.2); color: #f39c12; }

  .option-row input[type="text"] { flex: 1; }

  .option-correct {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  /* Order type */
  .order-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .order-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: var(--radius-btn);
    border: 1px solid var(--border);
  }

  .order-rank {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .order-item-label {
    width: 28px;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .order-item-text { flex: 1; font-size: 14px; }

  .order-arrows { display: flex; gap: 4px; }

  /* Time limit */
  .time-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }

  .time-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    min-width: 50px;
    text-align: right;
  }

  /* Image upload */
  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-card);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }

  .image-upload-area:hover { border-color: var(--accent); }
  .image-upload-area input { display: none; }

  .image-preview {
    max-height: 200px;
    max-width: 100%;
    border-radius: 8px;
    object-fit: contain;
  }

  /* Question list */
  .question-list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .question-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .question-list { padding: 8px; overflow-y: auto; flex: 1; min-height: 0; }

  .question-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-btn);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .question-item:hover { background: var(--surface2); }
  .question-item.active { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .question-item.dragging { opacity: 0.5; }

  .q-num {
    width: 24px;
    height: 24px;
    background: var(--surface2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .q-text {
    flex: 1;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .type-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .type-badge.single { background: rgba(108,99,255,0.2); color: var(--accent); }
  .type-badge.multi { background: rgba(34,197,94,0.2); color: var(--success); }
  .type-badge.order { background: rgba(245,158,11,0.2); color: var(--warning); }

  .ind-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .ind-badge.mult { background: rgba(245,158,11,0.2); color: var(--warning); }
  .ind-badge.opts { background: var(--surface2); color: var(--text-muted); }
  .ind-badge.unsaved-tag { background: rgba(239,68,68,0.2); color: var(--danger); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

  .btn-primary.unsaved { background: var(--warning); }

  .drag-handle {
    color: var(--text-muted);
    cursor: grab;
    font-size: 16px;
  }

  .drag-handle:active { cursor: grabbing; }

  /* Panel toolbar */
  .panel-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-toolbar-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .panel-toolbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1000;
  }

  .toast {
    padding: 12px 18px;
    border-radius: var(--radius-btn);
    font-size: 14px;
    font-weight: 500;
    animation: slideIn 0.2s ease;
    max-width: 300px;
  }

  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.warning { background: var(--warning); color: #fff; }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 16px;
  }

  .empty-questions {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .validation-error {
    font-size: 12px;
    color: var(--danger);
    margin-top: 2px;
  }

  #questionText:empty:before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    pointer-events: none;
  }

  .multiplier-btn {
    padding: 6px 14px;
    border-radius: var(--radius-btn);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.15s;
  }
  .multiplier-btn:hover { border-color: var(--accent); color: var(--accent); }
  .multiplier-btn.active { border-color: var(--warning); background: rgba(245,158,11,0.15); color: var(--warning); }
</style>
</head>
<body>

<header>
  <h1>Quiz Game Editor</h1>
  <button class="btn btn-primary" onclick="newQuiz()">+ New Quiz</button>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">Quizzes</div>
    <div class="quiz-list" id="quizList"></div>
    <div class="sidebar-footer">
      <label class="btn btn-secondary btn-sm" style="flex:1;justify-content:center;cursor:pointer;">
        Import JSON
        <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
      </label>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div id="emptyState" class="panel-empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/>
      </svg>
      <div style="font-size:16px;font-weight:600;">No quiz selected</div>
      <div>Create a new quiz or select one from the sidebar</div>
    </div>

    <div id="quizPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none;">
      <div class="panel-toolbar">
        <div class="panel-toolbar-title" id="quizTitleDisplay">Untitled Quiz</div>
        <div class="panel-toolbar-actions">
          <button class="btn btn-secondary btn-sm" onclick="exportJSON()">Export JSON</button>
          <button class="btn btn-danger btn-sm" onclick="deleteQuiz()">Delete Quiz</button>
        </div>
      </div>

      <div class="editor-area">
        <!-- Left: question editor form -->
        <div class="editor-form">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
              <div style="font-size:15px;font-weight:600;" id="editorFormTitle">New Question</div>
              <button class="btn btn-secondary btn-sm" onclick="resetForm()">Clear</button>
            </div>

            <!-- Image -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Image / GIF (optional)</label>
              <!-- Tab toggle -->
              <div style="display:flex;gap:0;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius-btn);overflow:hidden;">
                <button type="button" id="imgTabUpload" onclick="switchImgTab('upload')"
                  style="flex:1;padding:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:var(--accent);color:#fff;">Upload file</button>
                <button type="button" id="imgTabUrl" onclick="switchImgTab('url')"
                  style="flex:1;padding:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:var(--surface2);color:var(--text-muted);">Paste URL</button>
              </div>
              <!-- Upload panel -->
              <div id="imgPanelUpload">
                <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                  <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                  <div id="imagePrompt" style="color:var(--text-muted);font-size:13px;">
                    Click to upload image or GIF
                  </div>
                  <img id="imagePreview" class="image-preview" style="display:none;">
                </div>
              </div>
              <!-- URL panel -->
              <div id="imgPanelUrl" style="display:none;">
                <input type="text" id="imageUrlInput" placeholder="https://media.giphy.com/... or any image URL"
                  oninput="handleImageUrl(this.value)" style="margin-bottom:0;">
                <div id="imageUrlPreviewWrap" style="margin-top:8px;display:none;">
                  <img id="imageUrlPreview" class="image-preview" style="display:block;max-height:160px;" alt="">
                  <div id="imageUrlError" style="display:none;color:var(--danger);font-size:12px;margin-top:4px;">Could not load image — check the URL.</div>
                </div>
              </div>
              <button class="btn btn-secondary btn-sm" id="removeImageBtn" style="display:none;margin-top:6px;" onclick="removeImage()">Remove Image</button>
            </div>

            <!-- Audio -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Audio (optional) — paste a direct MP3/WAV URL</label>
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="text" id="audioUrlInput" placeholder="https://... direct audio link or Google Drive uc?export=view&id=..."
                  oninput="handleAudioUrlInput()" style="margin-bottom:0;flex:1;">
                <button type="button" id="audioTestBtn" class="btn btn-secondary btn-sm" onclick="testAudio()" style="display:none;flex-shrink:0;">▶ Test</button>
                <button type="button" id="audioRemoveBtn" class="btn btn-danger btn-sm" onclick="removeAudio()" style="display:none;flex-shrink:0;">✕</button>
              </div>
              <div id="audioStatus" style="font-size:12px;color:var(--text-muted);margin-top:4px;"></div>
              <audio id="audioTestEl" style="display:none;" oncanplay="onAudioReady()" onerror="onAudioError()"></audio>
            </div>

            <!-- Question text -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Question *</label>
              <div id="richToolbar" style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;">
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtCmd('bold')" title="Bold"><b>B</b></button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtCmd('italic')" title="Italic"><i>I</i></button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtSize(2)" title="Small text" style="font-size:11px;">S</button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtSize(3)" title="Normal text" style="font-size:14px;">M</button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtSize(5)" title="Large text" style="font-size:18px;">L</button>
                <button type="button" class="btn btn-secondary btn-sm" onclick="fmtCmd('removeFormat')" title="Clear formatting" style="font-size:12px;">✕</button>
              </div>
              <div id="questionText" contenteditable="true"
                   style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-btn);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;min-height:80px;line-height:1.6;transition:border-color 0.15s;"
                   data-placeholder="Enter your question here..."
                   onfocus="this.style.borderColor='var(--accent)'"
                   onblur="this.style.borderColor='var(--border)'"></div>
            </div>

            <!-- Type selector -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Question Type</label>
              <div class="type-selector">
                <button class="type-btn active" data-type="single" onclick="setType('single')">Single</button>
                <button class="type-btn" data-type="multi" onclick="setType('multi')">Multi</button>
                <button class="type-btn" data-type="order" onclick="setType('order')">Order</button>
              </div>
            </div>

            <!-- Options (single/multi) -->
            <div id="optionsSection" class="form-group" style="margin-bottom:14px;">
              <label id="optionsLabel">Options — select correct answer</label>
              <div id="optionsList">
                <div class="option-row">
                  <span class="option-label opt-a">A</span>
                  <input type="text" placeholder="Option A" data-idx="0" class="option-input">
                  <input type="radio" name="correct" value="0" class="option-correct" data-idx="0">
                </div>
                <div class="option-row">
                  <span class="option-label opt-b">B</span>
                  <input type="text" placeholder="Option B" data-idx="1" class="option-input">
                  <input type="radio" name="correct" value="1" class="option-correct" data-idx="1">
                </div>
                <div class="option-row">
                  <span class="option-label opt-c">C</span>
                  <input type="text" placeholder="Option C" data-idx="2" class="option-input">
                  <input type="radio" name="correct" value="2" class="option-correct" data-idx="2">
                </div>
                <div class="option-row">
                  <span class="option-label opt-d">D</span>
                  <input type="text" placeholder="Option D" data-idx="3" class="option-input">
                  <input type="radio" name="correct" value="3" class="option-correct" data-idx="3">
                </div>
              </div>
            </div>

            <!-- Order section -->
            <div id="orderSection" style="display:none;" class="form-group" style="margin-bottom:14px;">
              <label>Options & Correct Order (drag or use arrows)</label>
              <div id="orderOptionInputs" style="margin-bottom:12px;">
                <div class="option-row">
                  <span class="option-label opt-a">A</span>
                  <input type="text" placeholder="Option A" class="order-option-input" data-idx="0">
                </div>
                <div class="option-row">
                  <span class="option-label opt-b">B</span>
                  <input type="text" placeholder="Option B" class="order-option-input" data-idx="1">
                </div>
                <div class="option-row">
                  <span class="option-label opt-c">C</span>
                  <input type="text" placeholder="Option C" class="order-option-input" data-idx="2">
                </div>
                <div class="option-row">
                  <span class="option-label opt-d">D</span>
                  <input type="text" placeholder="Option D" class="order-option-input" data-idx="3">
                </div>
              </div>
              <label style="margin-bottom:8px;">Correct Order (top = 1st)</label>
              <div id="orderList" class="order-list"></div>
            </div>

            <!-- Point Multiplier -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Point Multiplier</label>
              <div style="display:flex;gap:6px;flex-wrap:wrap;">
                <button type="button" class="multiplier-btn active" data-mult="1" onclick="setMultiplier(1)">✕1</button>
                <button type="button" class="multiplier-btn" data-mult="2" onclick="setMultiplier(2)">✕2</button>
                <button type="button" class="multiplier-btn" data-mult="3" onclick="setMultiplier(3)">✕3</button>
                <button type="button" class="multiplier-btn" data-mult="5" onclick="setMultiplier(5)">✕5</button>
                <button type="button" class="multiplier-btn" data-mult="10" onclick="setMultiplier(10)">✕10</button>
              </div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Max score for this question: <span id="multPreview">1,000 pts</span></div>
            </div>

            <!-- Time limit -->
            <div class="form-group" style="margin-bottom:14px;">
              <label>Time Limit</label>
              <div class="time-row">
                <input type="range" id="timeLimit" min="10" max="300" value="60" step="5" oninput="updateTimeDisplay()">
                <span class="time-value" id="timeDisplay">20s</span>
              </div>
            </div>

            <div id="formError" class="validation-error" style="display:none;margin-bottom:10px;"></div>

            <div style="display:flex;gap:8px;">
              <button class="btn btn-primary" id="saveQuestionBtn" onclick="saveQuestion()" style="flex:1;">Save Question</button>
              <button class="btn btn-danger btn-sm" id="deleteQuestionBtn" onclick="deleteQuestion()" style="display:none;">Delete</button>
            </div>
          </div>
        </div>

        <!-- Right: question list -->
        <div class="editor-sidebar">
          <div class="question-list-card">
            <div class="question-list-header">
              <span>Questions</span>
              <span id="questionCount" style="font-size:12px;">0</span>
            </div>
            <div class="question-list" id="questionList">
              <div class="empty-questions">No questions yet.<br>Add your first question.</div>
            </div>
            <div style="padding:12px;border-top:1px solid var(--border);">
              <button class="btn btn-primary" style="width:100%;" onclick="newQuestion()">+ Add Question</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ─── Audio ────────────────────────────────────────────────────────────────────
function handleAudioUrlInput() {
  const url = document.getElementById('audioUrlInput').value.trim();
  const status = document.getElementById('audioStatus');
  const testBtn = document.getElementById('audioTestBtn');
  const removeBtn = document.getElementById('audioRemoveBtn');
  const el = document.getElementById('audioTestEl');
  if (!url) { status.textContent = ''; testBtn.style.display = 'none'; removeBtn.style.display = 'none'; el.src = ''; return; }
  status.textContent = 'Checking…';
  el.src = url;
  el.load();
}

function onAudioReady() {
  document.getElementById('audioStatus').textContent = '✓ Audio ready';
  document.getElementById('audioStatus').style.color = 'var(--success)';
  document.getElementById('audioTestBtn').style.display = 'inline-flex';
  document.getElementById('audioRemoveBtn').style.display = 'inline-flex';
}

function onAudioError() {
  document.getElementById('audioStatus').textContent = '✗ Could not load — check the URL';
  document.getElementById('audioStatus').style.color = 'var(--danger)';
  document.getElementById('audioTestBtn').style.display = 'none';
  document.getElementById('audioRemoveBtn').style.display = 'none';
}

function testAudio() {
  const el = document.getElementById('audioTestEl');
  if (el.paused) { el.play(); document.getElementById('audioTestBtn').textContent = '⏸ Pause'; }
  else { el.pause(); el.currentTime = 0; document.getElementById('audioTestBtn').textContent = '▶ Test'; }
}

function removeAudio() {
  document.getElementById('audioUrlInput').value = '';
  document.getElementById('audioTestEl').src = '';
  document.getElementById('audioTestBtn').style.display = 'none';
  document.getElementById('audioRemoveBtn').style.display = 'none';
  document.getElementById('audioStatus').textContent = '';
}

function getAudioUrl() {
  return document.getElementById('audioUrlInput').value.trim() || null;
}

// ─── Multiplier ───────────────────────────────────────────────────────────────
let currentMultiplier = 1;

function setMultiplier(val) {
  currentMultiplier = val;
  document.querySelectorAll('.multiplier-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mult) === val);
  });
  document.getElementById('multPreview').textContent = (1000 * val).toLocaleString() + ' pts';
  markDirty();
}

// ─── Unsaved-changes tracking ─────────────────────────────────────────────────
let formDirty = false;
let suppressDirty = false;

function markDirty() {
  if (suppressDirty || formDirty) return;
  formDirty = true;
  const btn = document.getElementById('saveQuestionBtn');
  btn.textContent = '● Save Question';
  btn.classList.add('unsaved');
  renderQuestionList();
}

function markClean() {
  formDirty = false;
  const btn = document.getElementById('saveQuestionBtn');
  btn.textContent = 'Save Question';
  btn.classList.remove('unsaved');
}

(function wireDirtyTracking() {
  const form = document.querySelector('.editor-form');
  if (!form) return;
  form.addEventListener('input', markDirty);
  form.addEventListener('change', markDirty);
})();

// ─── Rich text helpers ────────────────────────────────────────────────────────
function fmtCmd(cmd) {
  document.getElementById('questionText').focus();
  document.execCommand(cmd, false, null);
}
function fmtSize(size) {
  document.getElementById('questionText').focus();
  document.execCommand('fontSize', false, size);
}
function getQuestionHtml() {
  return document.getElementById('questionText').innerHTML.trim();
}
function getQuestionPlain() {
  return document.getElementById('questionText').innerText.trim();
}

// ─── State ───────────────────────────────────────────────────────────────────
let quizzes = [];
let currentQuizId = null;
let currentQuestionId = null;
let currentType = 'single';
let orderCorrectSequence = [0, 1, 2, 3]; // indices in correct order
let dragSrcEl = null;

// ─── Storage ─────────────────────────────────────────────────────────────────
function loadQuizzes() {
  quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
}

function saveQuizzes() {
  localStorage.setItem('quizzes', JSON.stringify(quizzes));
}

function uuid() {
  return crypto.randomUUID();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadQuizzes();
renderQuizList();

// ─── Quiz CRUD ────────────────────────────────────────────────────────────────
function newQuiz() {
  const q = {
    id: uuid(),
    title: 'Untitled Quiz',
    createdAt: new Date().toISOString(),
    questions: []
  };
  quizzes.push(q);
  saveQuizzes();
  renderQuizList();
  selectQuiz(q.id);
  // Inline rename immediately
  const items = document.querySelectorAll('.quiz-item');
  items.forEach(el => {
    if (el.dataset.id === q.id) startRename(el, q);
  });
}

function selectQuiz(id) {
  currentQuizId = id;
  currentQuestionId = null;
  renderQuizList();
  renderQuizPanel();
  resetForm();
}

function getQuiz() {
  return quizzes.find(q => q.id === currentQuizId);
}

function deleteQuiz() {
  if (!currentQuizId) return;
  const quiz = getQuiz();
  if (!confirm(`Delete "${quiz.title}"? This cannot be undone.`)) return;
  quizzes = quizzes.filter(q => q.id !== currentQuizId);
  saveQuizzes();
  currentQuizId = null;
  currentQuestionId = null;
  renderQuizList();
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('quizPanel').style.display = 'none';
}

function startRename(el, quiz) {
  const titleEl = el.querySelector('.quiz-item-title');
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'quiz-item-title-input';
  input.value = quiz.title;
  titleEl.replaceWith(input);
  input.focus();
  input.select();

  function finish() {
    const val = input.value.trim() || 'Untitled Quiz';
    quiz.title = val;
    saveQuizzes();
    renderQuizList();
    if (currentQuizId === quiz.id) {
      document.getElementById('quizTitleDisplay').textContent = val;
    }
  }
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = quiz.title; input.blur(); }
  });
}

// ─── Render quiz list ────────────────────────────────────────────────────────
function renderQuizList() {
  const el = document.getElementById('quizList');
  if (!quizzes.length) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px;text-align:center;">No quizzes yet</div>';
    return;
  }
  el.innerHTML = quizzes.map(q => `
    <div class="quiz-item ${q.id === currentQuizId ? 'active' : ''}" data-id="${q.id}" onclick="selectQuiz('${q.id}')">
      <div class="quiz-item-title">${escHtml(q.title)}</div>
      <span class="quiz-count">${q.questions.length}q</span>
      <button class="btn-icon btn" onclick="event.stopPropagation();startRenameById('${q.id}')" title="Rename" style="padding:4px;">✎</button>
    </div>
  `).join('');
}

function startRenameById(id) {
  const quiz = quizzes.find(q => q.id === id);
  const el = document.querySelector(`.quiz-item[data-id="${id}"]`);
  if (el && quiz) startRename(el, quiz);
}

// ─── Render quiz panel ───────────────────────────────────────────────────────
function renderQuizPanel() {
  const quiz = getQuiz();
  if (!quiz) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('quizPanel').style.display = 'flex';
  document.getElementById('quizTitleDisplay').textContent = quiz.title;
  renderQuestionList();
}

function renderQuestionList() {
  const quiz = getQuiz();
  const el = document.getElementById('questionList');
  const countEl = document.getElementById('questionCount');

  if (!quiz || !quiz.questions.length) {
    el.innerHTML = '<div class="empty-questions">No questions yet.<br>Add your first question.</div>';
    countEl.textContent = '0';
    return;
  }

  countEl.textContent = quiz.questions.length;
  el.innerHTML = quiz.questions.map((q, i) => {
    const optCount = (q.options || []).filter(o => o && o.trim()).length;
    const mult = q.multiplier || 1;
    const multBadge = mult > 1 ? `<span class="ind-badge mult">⚡×${mult}</span>` : '';
    const unsavedBadge = (formDirty && q.id === currentQuestionId) ? `<span class="ind-badge unsaved-tag">● Unsaved</span>` : '';
    return `
    <div class="question-item ${q.id === currentQuestionId ? 'active' : ''}"
         data-id="${q.id}" data-idx="${i}"
         draggable="true"
         onclick="editQuestion('${q.id}')">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="q-num">${i + 1}</span>
      <span class="q-text">${escHtml(q.question || '(no text)')}</span>
      ${unsavedBadge}
      ${multBadge}
      <span class="ind-badge opts" title="Filled options">${optCount} opts</span>
      <span class="type-badge ${q.type}">${q.type[0].toUpperCase()}</span>
    </div>`;
  }).join('');

  // Drag-to-reorder
  el.querySelectorAll('.question-item').forEach(item => {
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover', onDragOver);
    item.addEventListener('drop', onDrop);
    item.addEventListener('dragend', onDragEnd);
  });
}

// ─── Drag-to-reorder ─────────────────────────────────────────────────────────
function onDragStart(e) {
  dragSrcEl = this;
  e.dataTransfer.effectAllowed = 'move';
  this.classList.add('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDrop(e) {
  e.stopPropagation();
  if (dragSrcEl === this) return;
  const quiz = getQuiz();
  const srcIdx = parseInt(dragSrcEl.dataset.idx);
  const dstIdx = parseInt(this.dataset.idx);
  const [moved] = quiz.questions.splice(srcIdx, 1);
  quiz.questions.splice(dstIdx, 0, moved);
  saveQuizzes();
  renderQuestionList();
}

function onDragEnd() {
  document.querySelectorAll('.question-item').forEach(i => i.classList.remove('dragging'));
}

// ─── Question Editor ──────────────────────────────────────────────────────────
function newQuestion() {
  currentQuestionId = null;
  resetForm();
  document.getElementById('editorFormTitle').textContent = 'New Question';
  document.getElementById('deleteQuestionBtn').style.display = 'none';
}

function editQuestion(id) {
  if (formDirty && !confirm('You have unsaved changes. Discard them?')) return;
  const quiz = getQuiz();
  const q = quiz.questions.find(q => q.id === id);
  if (!q) return;
  currentQuestionId = id;
  loadQuestionIntoForm(q);
  renderQuestionList();
}

function loadQuestionIntoForm(q) {
  suppressDirty = true;
  document.getElementById('editorFormTitle').textContent = 'Edit Question';
  document.getElementById('deleteQuestionBtn').style.display = 'inline-flex';
  document.getElementById('questionText').innerHTML = q.textHtml || escHtml(q.question || '');
  document.getElementById('timeLimit').value = q.timeLimit || 60;
  updateTimeDisplay();
  setMultiplier(q.multiplier || 1);
  // Load audio
  const audioInput = document.getElementById('audioUrlInput');
  audioInput.value = q.audio || '';
  if (q.audio) handleAudioUrlInput(); else removeAudio();
  setType(q.type || 'single', false);

  // Image
  if (q.image) {
    if (q.image.startsWith('data:')) {
      switchImgTab('upload');
      document.getElementById('imagePreview').src = q.image;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('imagePrompt').style.display = 'none';
    } else {
      switchImgTab('url');
      document.getElementById('imageUrlInput').value = q.image;
      handleImageUrl(q.image);
    }
    document.getElementById('removeImageBtn').style.display = 'inline-flex';
  } else {
    clearImageUI();
  }

  if (q.type === 'order') {
    const inputs = document.querySelectorAll('.order-option-input');
    inputs.forEach((inp, i) => { inp.value = q.options[i] || ''; });
    orderCorrectSequence = [...q.correct];
    renderOrderList();
  } else {
    const inputs = document.querySelectorAll('.option-input');
    inputs.forEach((inp, i) => { inp.value = q.options[i] || ''; });

    // Set correct
    const corrects = document.querySelectorAll('.option-correct');
    corrects.forEach(c => { c.checked = false; });
    if (q.type === 'single') {
      corrects.forEach(c => {
        if (parseInt(c.value) === q.correct[0]) c.checked = true;
      });
    } else {
      corrects.forEach(c => {
        if (q.correct.includes(parseInt(c.value))) c.checked = true;
      });
    }
  }
  suppressDirty = false;
  markClean();
}

function resetForm() {
  suppressDirty = true;
  currentQuestionId = null;
  document.getElementById('editorFormTitle').textContent = 'New Question';
  document.getElementById('deleteQuestionBtn').style.display = 'none';
  document.getElementById('questionText').innerHTML = '';
  document.getElementById('timeLimit').value = 60;
  updateTimeDisplay();
  setMultiplier(1);
  removeAudio();
  clearImageUI();
  setType('single', true);
  document.getElementById('formError').style.display = 'none';
  suppressDirty = false;
  markClean();
}

function setType(type, clearOptions = true) {
  currentType = type;
  if (clearOptions) markDirty();

  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });

  if (type === 'order') {
    document.getElementById('optionsSection').style.display = 'none';
    document.getElementById('orderSection').style.display = '';

    if (clearOptions) {
      document.querySelectorAll('.order-option-input').forEach(i => i.value = '');
      orderCorrectSequence = [0, 1, 2, 3];
      renderOrderList();
    }
  } else {
    document.getElementById('optionsSection').style.display = '';
    document.getElementById('orderSection').style.display = 'none';

    const label = document.getElementById('optionsLabel');
    const corrects = document.querySelectorAll('.option-correct');

    if (type === 'single') {
      label.textContent = 'Options — select correct answer';
      corrects.forEach(c => {
        c.type = 'radio';
        c.name = 'correct';
      });
    } else {
      label.textContent = 'Options — select all correct answers';
      corrects.forEach(c => {
        c.type = 'checkbox';
        c.name = '';
      });
    }

    if (clearOptions) {
      document.querySelectorAll('.option-input').forEach(i => i.value = '');
      corrects.forEach(c => c.checked = false);
    }
  }
}

function renderOrderList() {
  const inputs = document.querySelectorAll('.order-option-input');
  const el = document.getElementById('orderList');
  const labels = ['A', 'B', 'C', 'D'];
  const colors = ['opt-a', 'opt-b', 'opt-c', 'opt-d'];

  el.innerHTML = orderCorrectSequence.map((optIdx, rank) => {
    const text = inputs[optIdx]?.value || `Option ${labels[optIdx]}`;
    return `
      <div class="order-item" data-pos="${rank}" data-opt="${optIdx}">
        <div class="order-rank">${rank + 1}</div>
        <div class="option-label ${colors[optIdx]} order-item-label">${labels[optIdx]}</div>
        <div class="order-item-text">${escHtml(text) || `<span style="color:var(--text-muted)">Option ${labels[optIdx]}</span>`}</div>
        <div class="order-arrows">
          ${rank > 0 ? `<button class="btn btn-icon btn-sm" onclick="moveOrder(${rank},-1)" title="Move up">↑</button>` : '<span style="width:28px;"></span>'}
          ${rank < 3 ? `<button class="btn btn-icon btn-sm" onclick="moveOrder(${rank},1)" title="Move down">↓</button>` : '<span style="width:28px;"></span>'}
        </div>
      </div>
    `;
  }).join('');
}

function moveOrder(pos, dir) {
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= orderCorrectSequence.length) return;
  [orderCorrectSequence[pos], orderCorrectSequence[newPos]] = [orderCorrectSequence[newPos], orderCorrectSequence[pos]];
  renderOrderList();
}

// Update order list when typing in order option inputs
document.querySelectorAll('.order-option-input').forEach(inp => {
  inp.addEventListener('input', () => renderOrderList());
});

function saveQuestion() {
  const quiz = getQuiz();
  if (!quiz) return;

  const qText = getQuestionPlain();
  const qHtml = getQuestionHtml();
  const timeLimit = parseInt(document.getElementById('timeLimit').value);
  const multiplier = currentMultiplier || 1;
  const audio = getAudioUrl();
  const image = getImageSrc();

  // Validate
  const errEl = document.getElementById('formError');
  errEl.style.display = 'none';

  if (!qText) {
    showError('Question text is required.'); return;
  }

  let options = [], correct = [];

  if (currentType === 'order') {
    const inputs = document.querySelectorAll('.order-option-input');
    options = Array.from(inputs).map(i => i.value.trim());
    const filledIndices = options.map((o, i) => o ? i : -1).filter(i => i >= 0);
    if (filledIndices.length < 2) { showError('At least 2 options are required.'); return; }
    // Keep blanks as empty strings
    correct = [...orderCorrectSequence].filter(i => filledIndices.includes(i));
    const sortedCorrect = [...correct].sort((a,b) => a - b);
    if (sortedCorrect.join(',') !== filledIndices.join(',')) { showError('Order correct sequence must include all filled option positions.'); return; }
  } else {
    const inputs = document.querySelectorAll('.option-input');
    options = Array.from(inputs).map(i => i.value.trim());
    const filledCount = options.filter(o => o).length;
    if (filledCount < 2) { showError('At least 2 options are required.'); return; }
    // Keep blanks as empty strings — screen will skip them automatically

    if (currentType === 'single') {
      const radio = document.querySelector('.option-correct:checked');
      if (!radio) { showError('Select a correct answer.'); return; }
      const correctIdx = parseInt(radio.value);
      if (!options[correctIdx]) { showError('Correct answer cannot be a blank option.'); return; }
      correct = [correctIdx];
    } else {
      const checked = Array.from(document.querySelectorAll('.option-correct:checked'));
      if (checked.length < 2) { showError('Select at least 2 correct answers for multi-choice.'); return; }
      correct = checked.map(c => parseInt(c.value)).sort();
      if (correct.some(idx => !options[idx])) { showError('Correct answers cannot include blank options.'); return; }
    }
  }

  if (currentQuestionId) {
    const q = quiz.questions.find(q => q.id === currentQuestionId);
    if (q) {
      q.question = qText;
      q.textHtml = qHtml;
      q.type = currentType;
      q.options = options;
      q.correct = correct;
      q.timeLimit = timeLimit;
      q.multiplier = multiplier;
      q.audio = audio;
      q.image = image;
    }
    toast('Question updated', 'success');
  } else {
    quiz.questions.push({
      id: uuid(),
      type: currentType,
      question: qText,
      textHtml: qHtml,
      options,
      correct,
      timeLimit,
      multiplier,
      audio,
      image
    });
    toast('Question added', 'success');
    currentQuestionId = quiz.questions[quiz.questions.length - 1].id;
  }

  markClean();
  saveQuizzes();
  renderQuestionList();
  document.getElementById('editorFormTitle').textContent = 'Edit Question';
  document.getElementById('deleteQuestionBtn').style.display = 'inline-flex';
}

function deleteQuestion() {
  if (!currentQuestionId) return;
  const quiz = getQuiz();
  if (!confirm('Delete this question?')) return;
  quiz.questions = quiz.questions.filter(q => q.id !== currentQuestionId);
  saveQuizzes();
  currentQuestionId = null;
  resetForm();
  renderQuestionList();
  toast('Question deleted', 'success');
}

function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── Image tab switching ──────────────────────────────────────────────────────
let currentImgTab = 'upload';

function switchImgTab(tab) {
  currentImgTab = tab;
  document.getElementById('imgPanelUpload').style.display = tab === 'upload' ? 'block' : 'none';
  document.getElementById('imgPanelUrl').style.display = tab === 'url' ? 'block' : 'none';
  document.getElementById('imgTabUpload').style.background = tab === 'upload' ? 'var(--accent)' : 'var(--surface2)';
  document.getElementById('imgTabUpload').style.color = tab === 'upload' ? '#fff' : 'var(--text-muted)';
  document.getElementById('imgTabUrl').style.background = tab === 'url' ? 'var(--accent)' : 'var(--surface2)';
  document.getElementById('imgTabUrl').style.color = tab === 'url' ? '#fff' : 'var(--text-muted)';
}

function getImageSrc() {
  if (currentImgTab === 'url') {
    const url = document.getElementById('imageUrlInput').value.trim();
    const img = document.getElementById('imageUrlPreview');
    return (url && img.style.display !== 'none') ? url : null;
  }
  const img = document.getElementById('imagePreview');
  return img.style.display !== 'none' ? img.src : null;
}

function handleImageUrl(url) {
  const wrap = document.getElementById('imageUrlPreviewWrap');
  const img = document.getElementById('imageUrlPreview');
  const err = document.getElementById('imageUrlError');
  const removeBtn = document.getElementById('removeImageBtn');
  if (!url.trim()) { wrap.style.display = 'none'; removeBtn.style.display = 'none'; return; }
  img.onload = () => { err.style.display = 'none'; img.style.display = 'block'; wrap.style.display = 'block'; removeBtn.style.display = 'inline-flex'; };
  img.onerror = () => { img.style.display = 'none'; err.style.display = 'block'; wrap.style.display = 'block'; removeBtn.style.display = 'none'; };
  img.src = url.trim();
}

// ─── Image handling ──────────────────────────────────────────────────────────
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const isGif = file.type === 'image/gif';
  const reader = new FileReader();
  reader.onload = e => {
    if (isGif) {
      // GIFs can't be re-encoded via Canvas — store as-is but warn if large
      if (e.target.result.length > 1.5 * 1024 * 1024) {
        toast('Large GIF — consider using the URL tab instead for better performance.', 'warning');
      }
      applyUploadPreview(e.target.result);
    } else {
      compressImage(e.target.result, compressed => applyUploadPreview(compressed));
    }
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function compressImage(dataUrl, callback) {
  const img = new Image();
  img.onload = () => {
    const MAX = 1000;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.82));
  };
  img.src = dataUrl;
}

function applyUploadPreview(src) {
  document.getElementById('imagePreview').src = src;
  document.getElementById('imagePreview').style.display = 'block';
  document.getElementById('imagePrompt').style.display = 'none';
  document.getElementById('removeImageBtn').style.display = 'inline-flex';
}

function removeImage() {
  clearImageUI();
}

function clearImageUI() {
  document.getElementById('imagePreview').src = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imagePrompt').style.display = 'block';
  document.getElementById('imageUrlInput').value = '';
  document.getElementById('imageUrlPreviewWrap').style.display = 'none';
  document.getElementById('removeImageBtn').style.display = 'none';
  switchImgTab('upload');
}

// ─── Time limit ───────────────────────────────────────────────────────────────
function updateTimeDisplay() {
  document.getElementById('timeDisplay').textContent = document.getElementById('timeLimit').value + 's';
}

// ─── Import / Export ─────────────────────────────────────────────────────────
function exportJSON() {
  const quiz = getQuiz();
  if (!quiz) return;
  const blob = new Blob([JSON.stringify(quiz, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${quiz.title.replace(/[^a-z0-9]/gi, '_')}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Quiz exported', 'success');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.title || !Array.isArray(data.questions)) {
        toast('Invalid quiz JSON format', 'error');
        return;
      }
      const existing = quizzes.find(q => q.title === data.title);
      if (existing) {
        if (!confirm(`A quiz named "${data.title}" already exists. Replace it?`)) return;
        quizzes = quizzes.filter(q => q.title !== data.title);
      }
      data.id = data.id || uuid();
      data.questions = data.questions.map(q => ({ ...q, id: q.id || uuid() }));
      quizzes.push(data);
      saveQuizzes();
      renderQuizList();
      selectQuiz(data.id);
      toast('Quiz imported', 'success');
    } catch {
      toast('Failed to parse JSON file', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init order list and time display on page load
renderOrderList();
updateTimeDisplay();
</script>
