<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game Host</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
(function() {
  const PASS = 'OT3960';
  const KEY = 'quiz_host_auth';
  if (sessionStorage.getItem(KEY) !== PASS) {
    const input = prompt('Enter password to access Host:');
    if (input !== PASS) {
      document.write('<div style="font-family:sans-serif;text-align:center;padding:80px;background:#0f0f13;color:#ef4444;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;"><div style="font-size:48px;">🔒</div><div style="font-size:20px;font-weight:700;">Access Denied</div><div style="font-size:14px;color:#8888a0;">Incorrect password.</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#6c63ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;">Try Again</button></div>');
      throw new Error('Unauthorised');
    }
    sessionStorage.setItem(KEY, PASS);
  }
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #23232f; --border: #2e2e3e;
    --accent: #6c63ff; --accent-hover: #5a52e0; --success: #22c55e;
    --danger: #ef4444; --warning: #f59e0b; --text: #e8e8f0; --text-muted: #8888a0;
    --radius-card: 12px; --radius-btn: 8px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-btn); border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; transition: background 0.15s, opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-warning { background: var(--warning); color: #111; }
  .btn-lg { padding: 12px 24px; font-size: 16px; }
  .main { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
  .left-col { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
  .right-col { flex: 1; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 16px; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-btn); color: var(--text); font-family: inherit; font-size: 14px; padding: 8px 12px; outline: none; width: 100%; margin-bottom: 10px; }
  .quiz-select-row { display: flex; gap: 8px; }
  .player-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .player-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface2); border-radius: var(--radius-btn); }
  .player-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .player-name { flex: 1; font-size: 14px; font-weight: 500; }
  .player-score { font-size: 14px; font-weight: 700; color: var(--accent); }
  .empty-players { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }
  #qrcode { display: flex; justify-content: center; padding: 8px; }
  .qr-label { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 4px; word-break: break-all; }
  .question-preview { background: var(--surface2); border-radius: var(--radius-btn); padding: 14px; margin-bottom: 14px; font-size: 15px; font-weight: 500; line-height: 1.5; }
  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-box { flex: 1; background: var(--surface2); border-radius: var(--radius-btn); padding: 12px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 4px; }
  .answer-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .answer-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .answer-fill { height: 100%; background: var(--success); border-radius: 4px; transition: width 0.3s; }
  .answer-count { font-size: 14px; font-weight: 600; min-width: 50px; text-align: right; }
  .controls { display: flex; flex-direction: column; gap: 10px; }
  .countdown-wrap { display: flex; justify-content: center; margin: 8px 0 16px; }
  .countdown-ring { position: relative; width: 80px; height: 80px; }
  .countdown-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .countdown-ring circle { fill: none; stroke-width: 5; }
  .countdown-ring .track { stroke: var(--border); }
  .countdown-ring .fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .countdown-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; }
  .options-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
  .opt-chip { padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .opt-chip.a { background: rgba(231,76,60,0.15); color: #e74c3c; }
  .opt-chip.b { background: rgba(52,152,219,0.15); color: #3498db; }
  .opt-chip.c { background: rgba(46,204,113,0.15); color: #2ecc71; }
  .opt-chip.d { background: rgba(243,156,18,0.15); color: #f39c12; }
  .opt-chip.correct { outline: 1px solid var(--success); }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-btn); margin-bottom: 8px; }
  .section-divider { height: 1px; background: var(--border); margin: 12px 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-accent { background: rgba(108,99,255,0.2); color: var(--accent); }
  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
  .toast { padding: 12px 18px; border-radius: var(--radius-btn); font-size: 14px; font-weight: 500; animation: slideIn 0.2s ease; }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1>Quiz Game Host</h1>
  <button class="btn btn-danger" id="endGameBtn" onclick="endGame()" style="display:none;">End Game</button>
</header>

<div class="main">
  <div class="left-col">
    <div class="card">
      <div class="card-title">Quiz</div>
      <div class="quiz-select-row">
        <select id="quizSelect" onchange="onQuizSelect()">
          <option value="">— Select a quiz —</option>
        </select>
        <label class="btn btn-secondary" style="cursor:pointer;padding:8px 10px;flex-shrink:0;" title="Import JSON">
          ↑
          <input type="file" accept=".json" style="display:none;" onchange="importQuizJSON(event)">
        </label>
      </div>
      <button class="btn btn-primary btn-lg" id="startGameBtn" style="width:100%;" onclick="startGame()" disabled>Start Game</button>
    </div>

    <div class="card" style="flex:1;">
      <div class="card-title">
        <span>Players <span id="playerCountBadge" class="badge badge-accent">0</span></span>
        <button class="btn btn-danger" style="padding:3px 8px;font-size:12px;" onclick="clearAllPlayers()" title="Remove all players">Clear All</button>
      </div>
      <div class="player-list" id="playerList">
        <div class="empty-players">No players yet.<br>Share QR code to join.</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Scan to Join</div>
      <div id="qrcode"></div>
      <div class="qr-label" id="qrLabel"></div>
    </div>
  </div>

  <div class="right-col">
    <div id="stateIdle" class="card">
      <div style="text-align:center;padding:40px 20px;color:var(--text-muted);">
        <div style="font-size:48px;margin-bottom:16px;">🎮</div>
        <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;">Ready to host</div>
        <div style="font-size:14px;">Select a quiz and press Start Game.</div>
      </div>
    </div>

    <div id="stateLobby" class="card" style="display:none;">
      <div class="card-title">Lobby</div>
      <div style="text-align:center;padding:24px 20px;color:var(--text-muted);">
        <div style="font-size:48px;font-weight:800;color:var(--text);" id="lobbyPlayerCount">0</div>
        <div>players joined</div>
        <div style="margin-top:16px;font-size:14px;" id="lobbyQuizInfo"></div>
      </div>
    </div>

    <div id="stateQuestion" class="card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="card-title" style="margin:0;" id="questionLabel">Question 1 / 10</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <div id="questionTypeBadge" class="badge badge-accent">Single</div>
          <div id="questionMultBadge" class="badge" style="display:none;background:rgba(245,158,11,0.2);color:#f59e0b;">⚡ ×1</div>
        </div>
      </div>
      <div class="question-preview" id="questionPreviewText"></div>
      <div id="optionsPreview" class="options-preview"></div>
      <div class="section-divider"></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-value" id="statAnswers">0</div><div class="stat-label">Answered</div></div>
        <div class="stat-box"><div class="stat-value" id="statPlayers">0</div><div class="stat-label">Players</div></div>
        <div class="stat-box"><div class="stat-value" id="statTime" style="color:var(--warning);">20</div><div class="stat-label">Seconds</div></div>
      </div>
      <div class="answer-progress">
        <div class="answer-bar"><div class="answer-fill" id="answerFill" style="width:0%;"></div></div>
        <div class="answer-count" id="answerCount">0 / 0</div>
      </div>
      <div class="countdown-wrap">
        <div class="countdown-ring">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle class="track" cx="40" cy="40" r="35"/>
            <circle class="fill" id="countdownCircle" cx="40" cy="40" r="35" stroke-dasharray="219.9" stroke-dashoffset="0"/>
          </svg>
          <div class="countdown-number" id="countdownNumber">20</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-warning btn-lg" onclick="revealAnswer()">Reveal Answer</button>
      </div>
    </div>

    <div id="stateReveal" class="card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="card-title" style="margin:0;" id="revealLabel">Answer Revealed</div>
      </div>
      <div class="question-preview" id="revealQuestionText"></div>
      <div id="revealOptionsPreview" class="options-preview" style="margin-bottom:16px;"></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-value" id="revealCorrect" style="color:var(--success);">0</div><div class="stat-label">Correct</div></div>
        <div class="stat-box"><div class="stat-value" id="revealWrong" style="color:var(--danger);">0</div><div class="stat-label">Wrong</div></div>
        <div class="stat-box"><div class="stat-value" id="revealTotal">0</div><div class="stat-label">Total</div></div>
      </div>
      <div class="controls">
        <button class="btn btn-primary btn-lg" id="nextOrLeaderboardBtn" onclick="nextOrLeaderboard()">Next Question →</button>
        <button class="btn btn-secondary btn-lg" onclick="showLeaderboard()">Show Leaderboard</button>
      </div>
    </div>

    <div id="stateLeaderboard" class="card" style="display:none;">
      <div class="card-title">Leaderboard</div>
      <div id="leaderboardList" style="margin-bottom:16px;"></div>
      <div class="controls">
        <button class="btn btn-primary btn-lg" id="leaderboardNextBtn" onclick="nextOrLeaderboard()">Next Question →</button>
        <button class="btn btn-danger btn-lg" id="leaderboardEndBtn" style="display:none;" onclick="endGame()">End Game</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ─── Screen channel (bypasses Firebase for large base64 images) ──────────────
const screenChannel = new BroadcastChannel('quiz-screen');

function broadcastImage(questionIndex, imageSrc) {
  screenChannel.postMessage({ type: 'QUESTION_IMAGE', index: questionIndex, image: imageSrc || null });
}

function preloadNextImage() {
  const next = currentQuiz?.questions[currentQuestionIndex + 1];
  if (next?.image) {
    const img = new Image();
    img.src = next.image; // warms browser cache; for base64 this is instant
  }
}

// ─── Firebase ────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyAEn27IjOW6-OxrkK8yNcnawPDOJmmWz2U",
  authDomain: "hc-quiz-game.firebaseapp.com",
  databaseURL: "https://hc-quiz-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hc-quiz-game",
  storageBucket: "hc-quiz-game.firebasestorage.app",
  messagingSenderId: "1047272317002",
  appId: "1:1047272317002:web:a71461f0b265bc12fec6b3"
});
const db = firebase.database();
const gameRef = db.ref('quizgame');
const gameStateRef = gameRef.child('gameState');
const playersRef = gameRef.child('players');

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'IDLE';
let currentQuiz = null;
let currentQuestionIndex = -1;
let players = {};
let questionAnswers = {};
let countdownInterval = null;
let timeRemaining = 0;
let firstCorrectThisQuestion = null;
let currentAnswerRef = null;

// ─── Listen to players ────────────────────────────────────────────────────────
playersRef.on('value', snap => {
  players = snap.val() || {};
  renderPlayerList();
  updateStartBtn();
  const count = Object.keys(players).length;
  document.getElementById('playerCountBadge').textContent = count;
  if (state === 'LOBBY') document.getElementById('lobbyPlayerCount').textContent = count;
  // broadcast player count via Firebase
  gameStateRef.child('playerCount').set(count);
});

// ─── Listen to answers ────────────────────────────────────────────────────────
function listenToAnswers(questionIndex) {
  if (currentAnswerRef) { currentAnswerRef.off('value'); currentAnswerRef = null; }
  currentAnswerRef = gameRef.child('answers').child(questionIndex);
  currentAnswerRef.on('value', snap => {
    questionAnswers = snap.val() || {};
    updateAnswerCount();
    renderPlayerList();
    const total = Object.keys(players).length;
    const answered = Object.keys(questionAnswers).length;
    if (total > 0 && answered >= total && state === 'QUESTION_ACTIVE') {
      clearCountdown();
      setTimeout(() => revealAnswer(), 800);
    }
  });
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  if (!currentQuiz) return;
  state = 'LOBBY';
  currentQuestionIndex = -1;

  // Clear previous game data (keep players so they don't need to re-join)
  gameRef.child('answers').remove();
  gameRef.child('kicked').remove();
  // Reset all player scores to 0
  Object.keys(players).forEach(pid => { players[pid].score = 0; playersRef.child(pid).update({ score: 0 }); });

  gameStateRef.set({
    status: 'LOBBY',
    quizTitle: currentQuiz.title,
    totalQuestions: currentQuiz.questions.length,
    questionIndex: -1,
    playerCount: 0,
    updatedAt: Date.now()
  });

  document.getElementById('lobbyQuizInfo').textContent =
    `"${currentQuiz.title}" — ${currentQuiz.questions.length} questions`;
  document.getElementById('lobbyPlayerCount').textContent = 0;

  showState('LOBBY');
  document.getElementById('startGameBtn').textContent = 'Next Question →';
  document.getElementById('startGameBtn').onclick = nextQuestion;
  document.getElementById('startGameBtn').disabled = false;
  document.getElementById('endGameBtn').style.display = 'inline-flex';
  toast('Game started! Click Next Question to begin.', 'success');
}

function nextQuestion() {
  currentQuestionIndex++;
  if (currentQuestionIndex >= currentQuiz.questions.length) {
    showLeaderboardFinal(); return;
  }
  state = 'QUESTION_ACTIVE';
  questionAnswers = {};
  firstCorrectThisQuestion = null;
  const q = currentQuiz.questions[currentQuestionIndex];
  const startTime = Date.now();

  // Strip base64 images from Firebase payload — send direct to screen via BroadcastChannel instead
  const qForFirebase = { ...q };
  if (q.image && q.image.startsWith('data:')) delete qForFirebase.image;
  broadcastImage(currentQuestionIndex, q.image);

  gameRef.child('answers').child(currentQuestionIndex).remove();
  gameStateRef.set({
    status: 'QUESTION_ACTIVE',
    quizTitle: currentQuiz.title,
    totalQuestions: currentQuiz.questions.length,
    questionIndex: currentQuestionIndex,
    question: qForFirebase,
    startTime,
    playerCount: Object.keys(players).length,
    updatedAt: Date.now()
  });

  listenToAnswers(currentQuestionIndex);

  document.getElementById('questionLabel').textContent =
    `Question ${currentQuestionIndex + 1} / ${currentQuiz.questions.length}`;
  document.getElementById('questionTypeBadge').textContent = typeName(q.type);
  const multBadge = document.getElementById('questionMultBadge');
  if (q.multiplier && q.multiplier > 1) {
    multBadge.textContent = `⚡ ×${q.multiplier}`;
    multBadge.style.display = 'inline-block';
  } else {
    multBadge.style.display = 'none';
  }
  document.getElementById('questionPreviewText').textContent = q.question;
  renderOptionsPreview('optionsPreview', q, null);
  document.getElementById('statPlayers').textContent = Object.keys(players).length;
  updateAnswerCount();
  showState('QUESTION_ACTIVE');
  startCountdown(q.timeLimit);
}

function revealAnswer() {
  if (state !== 'QUESTION_ACTIVE') return;
  clearCountdown();
  state = 'ANSWER_REVEAL';
  const q = currentQuiz.questions[currentQuestionIndex];

  // Calculate scores
  Object.entries(questionAnswers).forEach(([pid, data]) => {
    if (data.scored) return;
    const isCorrect = checkAnswer(q, data.answer);
    const isFirst = firstCorrectThisQuestion === null && isCorrect;
    if (isFirst) firstCorrectThisQuestion = pid;
    const score = calcScore(isCorrect, data.timeRemaining ?? timeRemaining, q.timeLimit, isFirst, q.multiplier);
    const player = players[pid];
    if (player) {
      const newScore = (player.score || 0) + score;
      players[pid].score = newScore; // update local cache so getLeaderboard() reads correct scores
      playersRef.child(pid).update({ score: newScore });
      gameRef.child('answers').child(currentQuestionIndex).child(pid).update({ isCorrect, score, scored: true });
    }
  });

  gameStateRef.update({
    status: 'ANSWER_REVEAL',
    correctAnswer: q.correct,
    leaderboard: getLeaderboard(),
    updatedAt: Date.now()
  });

  let correct = 0, wrong = 0;
  Object.values(questionAnswers).forEach(a => { checkAnswer(q, a.answer) ? correct++ : wrong++; });
  wrong += Math.max(0, Object.keys(players).length - Object.keys(questionAnswers).length);

  document.getElementById('revealLabel').textContent = `Q${currentQuestionIndex + 1} Answer`;
  document.getElementById('revealQuestionText').textContent = q.question;
  renderOptionsPreview('revealOptionsPreview', q, q.correct);
  document.getElementById('revealCorrect').textContent = correct;
  document.getElementById('revealWrong').textContent = wrong;
  document.getElementById('revealTotal').textContent = Object.keys(players).length;

  const isLast = currentQuestionIndex === currentQuiz.questions.length - 1;
  document.getElementById('nextOrLeaderboardBtn').textContent = isLast ? 'Show Final Leaderboard' : 'Next Question →';
  showState('ANSWER_REVEAL');
  preloadNextImage(); // warm up next question's image while players read the result
}

function nextOrLeaderboard() {
  const isLast = currentQuestionIndex >= currentQuiz.questions.length - 1;
  if (isLast) showLeaderboardFinal(); else nextQuestion();
}

function showLeaderboard() {
  state = 'LEADERBOARD';
  gameStateRef.update({ status: 'LEADERBOARD', leaderboard: getLeaderboard(), updatedAt: Date.now() });
  renderLeaderboard(false);
  showState('LEADERBOARD');
}

function showLeaderboardFinal() {
  state = 'LEADERBOARD';
  const scores = getLeaderboard();
  gameStateRef.update({ status: 'GAME_END', leaderboard: scores, updatedAt: Date.now() });
  renderLeaderboard(true);
  showState('LEADERBOARD');
}

function endGame() {
  if (!confirm('End the game?')) return;
  clearCountdown();
  gameStateRef.set({ status: 'IDLE', updatedAt: Date.now() });
  gameRef.child('answers').remove();
  gameRef.child('players').remove();
  gameRef.child('kicked').remove();
  state = 'IDLE';
  currentQuestionIndex = -1;
  players = {};
  questionAnswers = {};
  renderPlayerList();
  showState('IDLE');
  document.getElementById('startGameBtn').textContent = 'Start Game';
  document.getElementById('startGameBtn').onclick = startGame;
  document.getElementById('endGameBtn').style.display = 'none';
  updateStartBtn();
  toast('Game ended', 'success');
}

// ─── Score ────────────────────────────────────────────────────────────────────
function checkAnswer(q, answer) {
  if (!answer) return false;
  if (q.type === 'single') return answer.length === 1 && answer[0] === q.correct[0];
  if (q.type === 'multi') return JSON.stringify([...answer].sort()) === JSON.stringify([...q.correct].sort());
  if (q.type === 'order') return JSON.stringify(answer) === JSON.stringify(q.correct);
  return false;
}

function calcScore(isCorrect, timeRemaining, timeLimit, isFirstCorrect, multiplier) {
  if (!isCorrect) return 0;
  const base = Math.round(1000 * (timeRemaining / timeLimit)) * (multiplier || 1);
  return base + (isFirstCorrect ? 500 * (multiplier || 1) : 0);
}

function getLeaderboard() {
  return Object.entries(players)
    .sort(([,a],[,b]) => (b.score || 0) - (a.score || 0))
    .map(([pid, p], i) => ({ id: pid, name: p.name, score: p.score || 0, rank: i + 1 }));
}

// ─── Countdown ────────────────────────────────────────────────────────────────
function startCountdown(seconds) {
  const total = seconds;
  timeRemaining = seconds;
  const circ = 219.9;
  function tick() {
    document.getElementById('countdownNumber').textContent = timeRemaining;
    document.getElementById('statTime').textContent = timeRemaining;
    document.getElementById('countdownCircle').style.strokeDashoffset = circ * (1 - timeRemaining / total);
    document.getElementById('countdownNumber').style.color = timeRemaining <= 5 ? 'var(--danger)' : 'var(--text)';
    document.getElementById('statTime').style.color = timeRemaining <= 5 ? 'var(--danger)' : 'var(--warning)';
  }
  tick();
  countdownInterval = setInterval(() => {
    timeRemaining--;
    tick();
    if (timeRemaining <= 0) { clearCountdown(); revealAnswer(); }
  }, 1000);
}

function clearCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function showState(s) {
  const map = { IDLE:'stateIdle', LOBBY:'stateLobby', QUESTION_ACTIVE:'stateQuestion', ANSWER_REVEAL:'stateReveal', LEADERBOARD:'stateLeaderboard' };
  Object.values(map).forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById(map[s]).style.display = 'block';
}

function renderOptionsPreview(containerId, q, correctArr) {
  const labels = ['A','B','C','D'], cls = ['a','b','c','d'];
  document.getElementById(containerId).innerHTML = q.options.map((opt, i) => {
    if (!opt || !opt.trim()) return '';
    return `<div class="opt-chip ${cls[i]} ${correctArr && correctArr.includes(i) ? 'correct' : ''}">
      <strong>${labels[i]}</strong> ${escHtml(opt)} ${correctArr && correctArr.includes(i) ? '✓' : ''}
    </div>`;
  }).join('');
}

function updateAnswerCount() {
  const total = Object.keys(players).length;
  const answered = Object.keys(questionAnswers).length;
  const pct = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById('statAnswers').textContent = answered;
  document.getElementById('answerFill').style.width = pct + '%';
  document.getElementById('answerCount').textContent = `${answered} / ${total}`;
}

function renderPlayerList() {
  const el = document.getElementById('playerList');
  const sorted = Object.entries(players).sort(([,a],[,b]) => (b.score || 0) - (a.score || 0));
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-players">No players yet.<br>Share QR code to join.</div>'; return;
  }
  el.innerHTML = sorted.map(([pid, p]) => `
    <div class="player-row">
      <div class="player-dot"></div>
      <div class="player-name">${escHtml(p.name)}</div>
      <div class="player-score">${(p.score || 0).toLocaleString()}</div>
      <button onclick="removePlayer('${pid}')" title="Remove player" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;line-height:1;padding:0 2px;">×</button>
    </div>`).join('');
}

function removePlayer(pid) {
  if (state === 'QUESTION_ACTIVE') { toast('Cannot remove players during a question', 'error'); return; }
  const p = players[pid];
  if (!p) return;
  if (!confirm(`Remove "${p.name}" from the lobby?`)) return;
  gameRef.child('kicked').child(pid).set(true); // signals player's phone
  playersRef.child(pid).remove();
}

function clearAllPlayers() {
  if (state === 'QUESTION_ACTIVE') { toast('Cannot clear players during a question', 'error'); return; }
  if (!Object.keys(players).length) return;
  if (!confirm('Remove all players from the lobby?')) return;
  Object.keys(players).forEach(pid => gameRef.child('kicked').child(pid).set(true));
  playersRef.remove();
}

function renderLeaderboard(isFinal) {
  const scores = getLeaderboard();
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('leaderboardList').innerHTML = scores.slice(0, 10).map((p, i) => `
    <div class="lb-row" style="${i === 0 ? 'border:1px solid var(--warning);' : ''}">
      <div style="font-size:${i<3?'20px':'14px'};font-weight:700;width:28px;text-align:center;color:var(--text-muted);">${i<3?medals[i]:'#'+(i+1)}</div>
      <div style="flex:1;font-weight:500;">${escHtml(p.name)}</div>
      <div style="font-weight:700;font-size:16px;color:var(--accent);">${p.score.toLocaleString()}</div>
    </div>`).join('');
  const nextBtn = document.getElementById('leaderboardNextBtn');
  const endBtn = document.getElementById('leaderboardEndBtn');
  if (isFinal) { nextBtn.style.display = 'none'; endBtn.style.display = 'flex'; }
  else { nextBtn.style.display = 'flex'; nextBtn.textContent = currentQuestionIndex < currentQuiz.questions.length - 1 ? 'Next Question →' : 'Show Final Leaderboard'; endBtn.style.display = 'none'; }
}

function updateStartBtn() {
  document.getElementById('startGameBtn').disabled = !currentQuiz;
}

function typeName(t) { return { single:'Single', multi:'Multi', order:'Order' }[t] || t; }

// ─── Quiz loading ─────────────────────────────────────────────────────────────
function loadQuizList() {
  const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
  const sel = document.getElementById('quizSelect');
  sel.innerHTML = '<option value="">— Select a quiz —</option>';
  quizzes.forEach(q => { const opt = document.createElement('option'); opt.value = q.id; opt.textContent = `${q.title} (${q.questions.length}q)`; sel.appendChild(opt); });
}

function onQuizSelect() {
  const id = document.getElementById('quizSelect').value;
  if (!id) { currentQuiz = null; updateStartBtn(); return; }
  const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
  currentQuiz = quizzes.find(q => q.id === id) || null;
  updateStartBtn();
}

function importQuizJSON(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.title || !Array.isArray(data.questions)) { toast('Invalid quiz JSON', 'error'); return; }
      const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
      data.id = data.id || crypto.randomUUID();
      const idx = quizzes.findIndex(q => q.id === data.id);
      if (idx >= 0) quizzes[idx] = data; else quizzes.push(data);
      localStorage.setItem('quizzes', JSON.stringify(quizzes));
      loadQuizList();
      document.getElementById('quizSelect').value = data.id;
      onQuizSelect();
      toast('Quiz imported', 'success');
    } catch { toast('Failed to parse JSON', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── QR ──────────────────────────────────────────────────────────────────────
function initQR() {
  const playerUrl = window.location.origin + '/player.html';
  document.getElementById('qrLabel').textContent = playerUrl;
  try {
    new QRCode(document.getElementById('qrcode'), { text: playerUrl, width: 160, height: 160, colorDark: '#000', colorLight: '#fff' });
  } catch(e) { document.getElementById('qrcode').textContent = playerUrl; }
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadQuizList(); initQR(); showState('IDLE');
</script>
