<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e3e;
    --accent: #6c63ff; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
    --text: #e8e8f0; --text-muted: #8888a0;
    --opt-a: #e74c3c; --opt-b: #3498db; --opt-c: #2ecc71; --opt-d: #f39c12;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

  #screenWaiting { display: flex; flex-direction: row; align-items: stretch; height: 100%; }
  .waiting-left { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px; flex: 0 0 60%; border-right: 1px solid var(--border); }
  .waiting-title { font-size: 48px; font-weight: 800; color: var(--accent); letter-spacing: -1px; text-align: center; }
  .waiting-qr { background: #fff; border-radius: 16px; padding: 16px; }
  .player-count-big { font-size: 72px; font-weight: 800; color: var(--text); line-height: 1; }
  .player-count-label { font-size: 20px; color: var(--text-muted); margin-top: 4px; }
  .waiting-right { flex: 1; display: flex; flex-direction: column; padding: 32px; overflow: hidden; }
  .waiting-right-title { font-size: 16px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }
  .player-grid { display: flex; flex-wrap: wrap; gap: 12px; align-content: flex-start; overflow-y: auto; flex: 1; }
  .player-chip { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 8px 18px 8px 8px; animation: chipPop 0.3s ease; }
  @keyframes chipPop { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }
  .player-chip-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .player-chip-name { font-size: 15px; font-weight: 600; }

  #screenQuestion { display: none; flex-direction: column; height: 100%; }
  .q-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--surface); border-bottom: 2px solid var(--border); flex-shrink: 0; }
  .q-progress { font-size: 20px; font-weight: 700; color: var(--text-muted); }
  .q-title-text { font-size: 20px; font-weight: 700; color: var(--text); }
  .countdown-circle-wrap { position: relative; width: 64px; height: 64px; }
  .countdown-circle-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .countdown-circle-wrap circle { fill: none; stroke-width: 5; }
  .countdown-track { stroke: var(--border); }
  .countdown-fill-circle { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .countdown-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; }
  .q-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 48px; overflow: hidden; gap: 20px; }
  .q-image { max-height: 28vh; max-width: 55%; border-radius: 12px; object-fit: contain; display: none; }
  .q-image-spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .q-text { font-size: clamp(22px, 3vw, 40px); font-weight: 700; text-align: center; line-height: 1.3; max-width: 900px; }
  .q-text font[size="1"] { font-size: 0.5em; }
  .q-text font[size="2"] { font-size: 0.7em; }
  .q-text font[size="3"] { font-size: 1em; }
  .q-text font[size="4"] { font-size: 1.15em; }
  .q-text font[size="5"] { font-size: 1.4em; }
  .q-text font[size="6"] { font-size: 1.7em; }
  .q-text font[size="7"] { font-size: 2em; }
  .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 900px; }
  .opt-card { display: flex; align-items: center; gap: 16px; padding: 18px 24px; border-radius: 14px; font-size: clamp(16px, 2vw, 22px); font-weight: 600; transition: opacity 0.4s; position: relative; }
  .opt-card.a { background: var(--opt-a); } .opt-card.b { background: var(--opt-b); }
  .opt-card.c { background: var(--opt-c); } .opt-card.d { background: var(--opt-d); }
  .opt-letter { width: 36px; height: 36px; background: rgba(255,255,255,0.25); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; flex-shrink: 0; }
  .opt-text { flex: 1; }
  .opt-check { font-size: 24px; display: none; flex-shrink: 0; }
  .opt-card.wrong { opacity: 0.2; }
  .opt-card.correct .opt-check { display: block; }
  .opt-card.correct { outline: 3px solid #fff; }
  .reveal-banner { background: rgba(34,197,94,0.15); border: 1px solid var(--success); border-radius: 12px; padding: 12px 24px; text-align: center; font-size: 18px; font-weight: 600; color: var(--success); display: none; max-width: 900px; width: 100%; }
  .answers-bar-wrap { display: flex; align-items: center; gap: 12px; padding: 12px 32px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .answers-bar-label { font-size: 14px; color: var(--text-muted); flex-shrink: 0; }
  .answers-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
  .answers-bar-fill { height: 100%; background: var(--success); border-radius: 5px; transition: width 0.3s; }
  .answers-bar-count { font-size: 14px; font-weight: 700; min-width: 60px; text-align: right; }

  /* ── LEADERBOARD (mid-game) ── */
  #screenLeaderboard { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; gap: 24px; }
  .lb-title { font-size: 36px; font-weight: 800; color: var(--accent); }
  .lb-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 600px; }
  .lb-row { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-radius: 14px; background: var(--surface); border: 1px solid var(--border); opacity: 0; transform: translateX(-40px); transition: opacity 0.4s, transform 0.4s; }
  .lb-row.visible { opacity: 1; transform: translateX(0); }
  .lb-row.rank-1 { border-color: #f59e0b; background: rgba(245,158,11,0.1); font-size: 20px; }
  .lb-medal { font-size: 28px; width: 40px; text-align: center; }
  .lb-num { width: 36px; font-size: 18px; font-weight: 800; color: var(--text-muted); text-align: center; }
  .lb-name { flex: 1; font-weight: 600; }
  .lb-score { font-size: 20px; font-weight: 800; color: var(--accent); }

  /* ── FINAL DASHBOARD ── */
  #screenDashboard { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .dash-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: var(--surface); border-bottom: 2px solid var(--border); flex-shrink: 0; }
  .dash-title { font-size: 28px; font-weight: 800; color: var(--accent); }
  .dash-subtitle { font-size: 15px; color: var(--text-muted); margin-top: 2px; }
  .dash-body { flex: 1; display: grid; grid-template-columns: 1fr 1.4fr; gap: 0; overflow: hidden; }

  /* Podium */
  .dash-podium-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 32px 24px; border-right: 1px solid var(--border); gap: 16px; }
  .podium-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 12px; width: 100%; max-width: 380px; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .podium-avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; flex-shrink: 0; }
  .podium-name { font-size: 14px; font-weight: 700; text-align: center; word-break: break-word; }
  .podium-score { font-size: 13px; font-weight: 600; color: var(--accent); }
  .podium-block { width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .podium-block.p1 { background: linear-gradient(180deg,#f59e0b,#d97706); height: 110px; }
  .podium-block.p2 { background: linear-gradient(180deg,#94a3b8,#64748b); height: 80px; }
  .podium-block.p3 { background: linear-gradient(180deg,#cd7f32,#a0522d); height: 60px; }

  /* Table */
  .dash-table-col { overflow-y: auto; padding: 16px 24px; }
  .dash-table { width: 100%; border-collapse: collapse; }
  .dash-table th { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
  .dash-table th.right { text-align: right; }
  .dash-table td { padding: 10px 12px; border-bottom: 1px solid rgba(46,46,62,0.5); font-size: 15px; vertical-align: middle; }
  .dash-table td.right { text-align: right; font-weight: 700; color: var(--accent); }
  .dash-table tr.rank-1 td { background: rgba(245,158,11,0.08); }
  .dash-table tr.rank-2 td { background: rgba(148,163,184,0.06); }
  .dash-table tr.rank-3 td { background: rgba(205,127,50,0.06); }
  .dash-table tr { opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .dash-table tr.visible { opacity: 1; transform: translateY(0); }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 800; background: var(--surface); color: var(--text-muted); }
  .rank-badge.gold { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .rank-badge.silver { background: rgba(148,163,184,0.2); color: #94a3b8; }
  .rank-badge.bronze { background: rgba(205,127,50,0.2); color: #cd7f32; }
</style>
</head>
<body>
<div class="screen">
  <div id="screenWaiting">
    <!-- Left: QR + count -->
    <div class="waiting-left">
      <div class="waiting-title">🎮 Quiz Game</div>
      <div class="waiting-qr" id="qrcode"></div>
      <div style="font-size:16px;color:var(--text-muted);">Scan QR to join</div>
      <div style="text-align:center;">
        <div class="player-count-big" id="waitingCount">0</div>
        <div class="player-count-label">players joined</div>
      </div>
    </div>
    <!-- Right: player name list -->
    <div class="waiting-right">
      <div class="waiting-right-title">Players in lobby</div>
      <div class="player-grid" id="waitingPlayerGrid"></div>
    </div>
  </div>

  <div id="screenQuestion">
    <div class="q-header">
      <div class="q-progress" id="qProgress">Q 1</div>
      <div class="q-title-text" id="qTitleText"></div>
      <div class="countdown-circle-wrap">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <circle class="countdown-track" cx="32" cy="32" r="28"/>
          <circle class="countdown-fill-circle" id="countdownCircle" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"/>
        </svg>
        <div class="countdown-num" id="countdownNum">20</div>
      </div>
    </div>
    <div class="q-body">
      <div class="q-image-spinner" id="qImageSpinner"></div>
      <img id="qImage" class="q-image" alt="">
      <div class="q-text" id="qText"></div>
      <div id="multBanner" style="display:none;background:rgba(245,158,11,0.15);border:2px solid #f59e0b;border-radius:12px;padding:8px 28px;font-size:22px;font-weight:800;color:#f59e0b;letter-spacing:0.04em;"></div>
      <audio id="qAudio" style="display:none;" preload="auto"></audio>
      <button id="audioPlayBtn" onclick="toggleAudio()" style="display:none;background:rgba(108,99,255,0.2);border:2px solid var(--accent);border-radius:50px;color:var(--accent);font-size:20px;font-weight:800;padding:12px 36px;cursor:pointer;letter-spacing:0.04em;transition:background 0.15s;">▶ Play Audio</button>
      <div class="reveal-banner" id="revealBanner"></div>
      <div class="q-options" id="qOptions"></div>
    </div>
    <div class="answers-bar-wrap">
      <span class="answers-bar-label">Answers in:</span>
      <div class="answers-bar-track"><div class="answers-bar-fill" id="answersFill" style="width:0%"></div></div>
      <span class="answers-bar-count" id="answersCount">0 / 0</span>
    </div>
  </div>

  <div id="screenLeaderboard">
    <div class="lb-title" id="lbTitle">Leaderboard</div>
    <div class="lb-list" id="lbList"></div>
  </div>

  <!-- FINAL DASHBOARD -->
  <div id="screenDashboard">
    <div class="dash-header">
      <div>
        <div class="dash-title">🏆 Final Results</div>
        <div class="dash-subtitle" id="dashSubtitle">Game over — well done everyone!</div>
      </div>
      <div style="font-size:40px;">🎉</div>
    </div>
    <div class="dash-body">
      <!-- Podium -->
      <div class="dash-podium-col">
        <div style="font-size:16px;font-weight:700;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;">Top 3</div>
        <div class="podium-wrap" id="podiumWrap"></div>
      </div>
      <!-- Full table -->
      <div class="dash-table-col">
        <table class="dash-table">
          <thead>
            <tr>
              <th style="width:44px;">Rank</th>
              <th>Player</th>
              <th class="right">Score</th>
            </tr>
          </thead>
          <tbody id="dashTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAEn27IjOW6-OxrkK8yNcnawPDOJmmWz2U",
  authDomain: "hc-quiz-game.firebaseapp.com",
  databaseURL: "https://hc-quiz-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hc-quiz-game",
  storageBucket: "hc-quiz-game.firebasestorage.app",
  messagingSenderId: "1047272317002",
  appId: "1:1047272317002:web:a71461f0b265bc12fec6b3"
});
const db = firebase.database();
const gameStateRef = db.ref('quizgame/gameState');
const playersRef = db.ref('quizgame/players');
const answersRef = db.ref('quizgame/answers');

let countdownInterval = null;
let currentQuestionIndex = -1;

// Avatar colors for player chips
const AVATAR_COLORS = ['#6c63ff','#e74c3c','#3498db','#2ecc71','#f59e0b','#9b59b6','#1abc9c','#e67e22'];
function avatarColor(name) { let h=0; for(let c of name) h=(h<<5)-h+c.charCodeAt(0); return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function initials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

// Listen to players and render chips in waiting screen
playersRef.on('value', snap => {
  const data = snap.val() || {};
  const grid = document.getElementById('waitingPlayerGrid');
  if (!grid) return;
  const players = Object.values(data);
  document.getElementById('waitingCount').textContent = players.length;
  grid.innerHTML = players.map(p => `
    <div class="player-chip">
      <div class="player-chip-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
      <div class="player-chip-name">${escHtml(p.name)}</div>
    </div>`).join('');
});

// Listen to game state
gameStateRef.on('value', snap => {
  const gs = snap.val();
  if (!gs) return;

  switch (gs.status) {
    case 'LOBBY':
      showScreen('waiting');
      document.getElementById('qTitleText').textContent = gs.quizTitle || '';
      document.getElementById('waitingCount').textContent = gs.playerCount || 0;
      break;
    case 'QUESTION_ACTIVE':
      if (gs.questionIndex !== currentQuestionIndex) {
        currentQuestionIndex = gs.questionIndex;
        showQuestion(gs);
        // Apply image if it arrived via BroadcastChannel before Firebase updated
        if (pendingImages[currentQuestionIndex]) {
          setQuestionImage(pendingImages[currentQuestionIndex]);
          delete pendingImages[currentQuestionIndex];
        }
      }
      break;
    case 'ANSWER_REVEAL':
      if (gs.correctAnswer) showReveal(gs.correctAnswer);
      break;
    case 'LEADERBOARD':
      if (gs.leaderboard) showLeaderboard(gs.leaderboard, false);
      break;
    case 'GAME_END':
      if (gs.leaderboard) showLeaderboard(gs.leaderboard, true);
      break;
    case 'IDLE':
      showScreen('waiting');
      document.getElementById('waitingCount').textContent = 0;
      break;
  }

  if (gs.playerCount !== undefined) {
    document.getElementById('waitingCount').textContent = gs.playerCount;
  }
});

// Listen to answers for current question
function listenAnswers(questionIndex, totalPlayers) {
  answersRef.child(questionIndex).on('value', snap => {
    const answers = snap.val() || {};
    const count = Object.keys(answers).length;
    const total = totalPlayers || 0;
    const pct = total > 0 ? (count / total) * 100 : 0;
    document.getElementById('answersFill').style.width = pct + '%';
    document.getElementById('answersCount').textContent = `${count} / ${total}`;
  });
}

function showQuestion(gs) {
  const q = gs.question;
  clearCountdown();
  document.getElementById('qProgress').textContent = `Q ${gs.questionIndex + 1} / ${gs.totalQuestions}`;
  const qEl = document.getElementById('qText');
  if (q.textHtml) qEl.innerHTML = q.textHtml;
  else qEl.textContent = q.question;
  document.getElementById('revealBanner').style.display = 'none';
  const multBanner = document.getElementById('multBanner');
  if (q.multiplier && q.multiplier > 1) {
    multBanner.textContent = `⚡ ×${q.multiplier} Points`;
    multBanner.style.display = 'block';
  } else {
    multBanner.style.display = 'none';
  }

  setQuestionImage(q.image || null);
  setupAudio(q.audio || null);

  renderOptions(q);
  showScreen('question');

  const startTime = gs.startTime || Date.now();
  startCountdown(q.timeLimit, startTime);
  listenAnswers(gs.questionIndex, gs.playerCount);
}

function showReveal(correctAnswer) {
  clearCountdown();
  setupAudio(null); // stop audio when answer is revealed
  document.querySelectorAll('.opt-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    card.classList.remove('correct', 'wrong');
    if (correctAnswer.includes(idx)) card.classList.add('correct');
    else card.classList.add('wrong');
  });
  const labels = ['A','B','C','D'];
  const banner = document.getElementById('revealBanner');
  banner.textContent = `✓ Correct: ${correctAnswer.map(i => labels[i]).join(', ')}`;
  banner.style.display = 'block';
}

function showLeaderboard(scores, isFinal) {
  if (isFinal) { showDashboard(scores); return; }
  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('lbList');
  document.getElementById('lbTitle').textContent = 'Leaderboard';
  el.innerHTML = scores.slice(0, 10).map((p, i) => `
    <div class="lb-row ${i < 3 ? 'rank-' + (i+1) : ''}" data-rank="${i}">
      ${i < 3 ? `<div class="lb-medal">${medals[i]}</div>` : `<div class="lb-num">#${i+1}</div>`}
      <div class="lb-name">${escHtml(p.name)}</div>
      <div class="lb-score">${(p.score||0).toLocaleString()}</div>
    </div>`).join('');
  showScreen('leaderboard');
  const rows = [...el.querySelectorAll('.lb-row')].reverse();
  rows.forEach((row, i) => setTimeout(() => row.classList.add('visible'), i * 300));
}

function showDashboard(scores) {
  showScreen('dashboard');

  const avatarColors = ['#6c63ff','#e74c3c','#3498db','#2ecc71','#f59e0b','#9b59b6','#1abc9c','#e67e22'];
  function getColor(name) { let h=0; for(let c of name) h=(h<<5)-h+c.charCodeAt(0); return avatarColors[Math.abs(h)%avatarColors.length]; }
  function initials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

  // Subtitle
  document.getElementById('dashSubtitle').textContent =
    `${scores.length} player${scores.length!==1?'s':''} · Top score: ${(scores[0]?.score||0).toLocaleString()} pts`;

  // Podium (top 3)
  const podiumOrder = [scores[1], scores[0], scores[2]].filter(Boolean); // 2nd, 1st, 3rd
  const podiumClasses = ['p2','p1','p3'];
  const podiumHeights = ['80px','110px','60px'];
  const podiumLabels = ['🥈','🥇','🥉'];
  const podiumSizes = ['52px','64px','44px'];

  document.getElementById('podiumWrap').innerHTML = podiumOrder.map((p, i) => `
    <div class="podium-slot">
      <div class="podium-avatar" style="width:${podiumSizes[i]};height:${podiumSizes[i]};background:${getColor(p.name)};font-size:${i===1?'22px':'16px'};">
        ${initials(p.name)}
      </div>
      <div class="podium-name" style="font-size:${i===1?'16px':'13px'};color:var(--text);">${escHtml(p.name)}</div>
      <div class="podium-score">${(p.score||0).toLocaleString()}</div>
      <div class="podium-block ${podiumClasses[i]}" style="height:${podiumHeights[i]};">${podiumLabels[i]}</div>
    </div>`).join('');

  // Full table
  const rankClasses = ['rank-1','rank-2','rank-3'];
  const badgeClasses = ['gold','silver','bronze'];
  const tbody = document.getElementById('dashTableBody');
  tbody.innerHTML = scores.map((p, i) => `
    <tr class="${rankClasses[i]||''}" data-i="${i}">
      <td><span class="rank-badge ${badgeClasses[i]||''}">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:${getColor(p.name)};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;">${initials(p.name)}</div>
          <span style="font-weight:600;">${escHtml(p.name)}</span>
        </div>
      </td>
      <td class="right">${(p.score||0).toLocaleString()}</td>
    </tr>`).join('');

  // Animate rows in
  const rows = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => setTimeout(() => row.classList.add('visible'), i * 80));
}

function renderOptions(q) {
  const labels = ['A','B','C','D'], cls = ['a','b','c','d'];
  const filledIndices = q.options.map((o, i) => (o && o.trim()) ? i : -1).filter(i => i >= 0);
  const filled = filledIndices.length;
  const lastFilledIdx = filledIndices[filledIndices.length - 1];
  const container = document.getElementById('qOptions');
  container.style.gridTemplateColumns = '1fr 1fr';
  container.innerHTML = q.options.map((opt, i) => {
    if (!opt || !opt.trim()) return '';
    const spanFull = filled === 3 && i === lastFilledIdx;
    return `<div class="opt-card ${cls[i]}" data-idx="${i}" style="${spanFull ? 'grid-column:span 2;' : ''}">
      <div class="opt-letter">${labels[i]}</div>
      <div class="opt-text">${escHtml(opt)}</div>
      <div class="opt-check">✓</div>
    </div>`;
  }).join('');
}

function startCountdown(seconds, startTime) {
  clearCountdown();
  const total = seconds;
  const circ = 175.9;
  let remaining = Math.max(0, seconds - Math.floor((Date.now() - startTime) / 1000));
  function tick() {
    document.getElementById('countdownNum').textContent = remaining;
    document.getElementById('countdownCircle').style.strokeDashoffset = circ * (1 - remaining / total);
    document.getElementById('countdownCircle').style.stroke = remaining <= 5 ? 'var(--danger)' : 'var(--accent)';
    document.getElementById('countdownNum').style.color = remaining <= 5 ? 'var(--danger)' : 'var(--text)';
  }
  tick();
  countdownInterval = setInterval(() => { remaining--; tick(); if (remaining <= 0) clearCountdown(); }, 1000);
}

function clearCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function showScreen(name) {
  document.getElementById('screenWaiting').style.display = name === 'waiting' ? 'flex' : 'none';
  document.getElementById('screenQuestion').style.display = name === 'question' ? 'flex' : 'none';
  document.getElementById('screenLeaderboard').style.display = name === 'leaderboard' ? 'flex' : 'none';
  document.getElementById('screenDashboard').style.display = name === 'dashboard' ? 'flex' : 'none';
}

function setupAudio(url) {
  const audio = document.getElementById('qAudio');
  const btn = document.getElementById('audioPlayBtn');
  audio.pause();
  audio.currentTime = 0;
  if (url) {
    audio.src = url;
    audio.load();
    btn.textContent = '▶ Play Audio';
    btn.style.display = 'inline-block';
    audio.onended = () => { btn.textContent = '▶ Play Again'; };
  } else {
    audio.src = '';
    btn.style.display = 'none';
  }
}

function toggleAudio() {
  const audio = document.getElementById('qAudio');
  const btn = document.getElementById('audioPlayBtn');
  if (audio.paused) {
    audio.play();
    btn.textContent = '⏸ Pause';
  } else {
    audio.pause();
    btn.textContent = '▶ Play Audio';
  }
}

function setQuestionImage(src) {
  const img = document.getElementById('qImage');
  const spinner = document.getElementById('qImageSpinner');
  if (!src) { img.style.display = 'none'; img.src = ''; spinner.style.display = 'none'; return; }
  spinner.style.display = 'block';
  img.style.display = 'none';
  img.onload = () => { spinner.style.display = 'none'; img.style.display = 'block'; };
  img.onerror = () => { spinner.style.display = 'none'; };
  img.src = src;
}

// Receive base64 images direct from host (bypasses Firebase)
const pendingImages = {};
const screenChannel = new BroadcastChannel('quiz-screen');
screenChannel.onmessage = e => {
  if (e.data.type === 'QUESTION_IMAGE') {
    if (e.data.index === currentQuestionIndex) {
      setQuestionImage(e.data.image);
    } else {
      pendingImages[e.data.index] = e.data.image; // cache if Firebase hasn't updated yet
    }
  }
};

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// QR Code
(function() {
  const origin = window.location.origin;
  const playerUrl = origin + '/player.html';
  try { new QRCode(document.getElementById('qrcode'), { text: playerUrl, width: 200, height: 200, colorDark: '#000', colorLight: '#fff' }); }
  catch(e) { document.getElementById('qrcode').textContent = playerUrl; }
})();
</script>
